name: Lint

on:
  push:
    branches: [master, develop]
  pull_request:

jobs:
  ruff:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install ruff
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[lint]"

      - name: Run ruff
        run: |
          ruff check castle
          ruff format --check castle
